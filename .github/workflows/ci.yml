name: CI

# Build, test, and run the golden-render harness on macOS — the platform
# the shell, the C ABI, and eventually Metal target. The golden hashes are
# the project's heartbeat: this job fails if any rendered output drifts
# from golden/baseline.json. The number only goes up.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-golden:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Tests (unit + tidy)
        run: zig build test --summary all

      - name: C ABI dylib + header
        run: zig build lib

      # The Phase 1 hard gate: the whole bk_ surface exercised from plain C
      # against the debug dylib, whose per-engine debug allocator asserts a
      # clean leak report on destroy.
      - name: C ABI smoke + leak gate
        run: zig build test-abi

      # Build gate only — there is no GUI to drive headlessly; the runner's
      # Xcode provides swift build.
      - name: SwiftUI shell build
        run: zig build shell

      - name: Golden-render conformance
        run: zig build golden

      # The wombat hard gate: 10k randomized vault workloads under crash
      # injection, zero acknowledged-data loss. Seeded by the commit hash,
      # so every commit explores differently and any failure replays
      # locally from the hash alone.
      - name: Crash simulator (10k runs)
        run: zig build sim

      # The catalog speedometer: a two-column filter over 100k assets, in
      # single-digit milliseconds. Fails on >2x the 10 ms budget.
      - name: Catalog filter benchmark
        run: zig build bench
